name: Monitoreo de Emergencias

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: monitor-crv
  cancel-in-progress: false

jobs:
  monitorear:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar monitoreo
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
        run: python main.py

   - name: Guardar cambios (datos y sitio)
     run: |
       git config user.name "AlertaCRV Bot"
       git config user.email "actions@users.noreply.github.com"
       git add data/publicados.json docs/data/noticias.json
       git diff --staged --quiet || git commit -m "Actualizar reportes [skip ci]"
       git pull --rebase origin main
       git push
          git config user.name "AlertaCRV Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/publicados.json docs/data/noticias.json
          git diff --staged --quiet || git commit -m "Actualizar reportes [skip ci]"
          git push
